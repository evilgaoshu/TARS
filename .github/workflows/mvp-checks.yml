name: MVP Checks

# Stable baseline workflow for GitHub required checks.
# Manual layered draft lives in .github/workflows/ci-layered.yml.

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

permissions:
  contents: read

jobs:
  l0-pre-check:
    name: L0 Pre-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005
        with:
          ruby-version: '3.1.1'

      - name: Run pre-check
        run: make pre-check

  l1-mvp-checks:
    name: L1 MVP Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005
        with:
          ruby-version: '3.1.1'

      - name: Install Web Dependencies
        working-directory: web
        run: npm ci

      - name: Run MVP Checks
        run: make check-mvp

  l2-security-regression:
    name: L2 Security Regression
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Run security regression
        run: make security-regression

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run secret scan
        run: make secret-scan

  static-demo-build:
    name: Static Demo Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run static demo build
        run: make static-demo-build
