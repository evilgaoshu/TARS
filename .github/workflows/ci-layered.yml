name: CI Layered Draft

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-check:
    name: L0 Pre-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005
        with:
          ruby-version: '3.1.1'

      - name: Run pre-check
        run: make pre-check

  full-check:
    name: L1 Full-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: pre-check
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005
        with:
          ruby-version: '3.1.1'

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run full-check
        run: make full-check
