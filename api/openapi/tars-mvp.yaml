          type: string
        tenant_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentRoleProfile:
      type: object
      properties:
        system_prompt:
          type: string
        persona_tags:
          type: array
          items:
            type: string

    AgentRoleCapabilityBinding:
      type: object
      required: [mode]
      properties:
        allowed_connector_capabilities:
          type: array
          items:
            type: string
        denied_connector_capabilities:
          type: array
          items:
            type: string
        allowed_skills:
          type: array
          items:
            type: string
        allowed_skill_tags:
          type: array
          items:
            type: string
        mode:
          type: string
          enum: [whitelist, blacklist, unrestricted]

    AgentRolePolicyBinding:
      type: object
      required: [max_risk_level, max_action]
      properties:
        max_risk_level:
          type: string
          enum: [info, warning, critical]
        max_action:
          type: string
          enum: [suggest_only, require_approval, direct_execute]
        require_approval_for:
          type: array
          items:
            type: string
        hard_deny:
          type: array
          items:
            type: string

    AgentRoleModelBinding:
      type: object
      properties:
        primary:
          $ref: "#/components/schemas/AgentRoleModelTargetBinding"
        fallback:
          $ref: "#/components/schemas/AgentRoleModelTargetBinding"
        inherit_platform_default:
          type: boolean

    AgentRoleModelTargetBinding:
      type: object
      properties:
        provider_id:
          type: string
        model:
          type: string
