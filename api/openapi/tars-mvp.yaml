    AgentRoleListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AgentRole"
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        has_next:
          type: boolean

    AgentRole:
      type: object
      required:
        [
          role_id,
          display_name,
          status,
          is_builtin,
          profile,
          capability_binding,
          policy_binding,
        ]
      properties:
        role_id:
          type: string
        display_name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [enabled, disabled]
        is_builtin:
          type: boolean
        profile:
          $ref: "#/components/schemas/AgentRoleProfile"
        capability_binding:
          $ref: "#/components/schemas/AgentRoleCapabilityBinding"
        policy_binding:
          $ref: "#/components/schemas/AgentRolePolicyBinding"
        model_binding:
          $ref: "#/components/schemas/AgentRoleModelBinding"
