openapi: 3.1.0
info:
  title: TARS MVP API
  version: 0.1.0
  description: |
    Draft API definition aligned with tars_technical_design.md v1.4.
    Tag names describe API contract groupings, not Web Console page ownership.
    In particular, the `ops` tag means authenticated control-plane APIs and is
    not equivalent to the `/ops` UI page; some `ops`-tagged APIs are primarily
    surfaced from other daily object pages such as `/identity/*`, `/providers`,
    and `/connectors`.
servers:
  - url: https://tars.example.com
tags:
  - name: public
    description: Public or bootstrap endpoints that do not require an authenticated control-plane session.
  - name: ops
    description: Authenticated control-plane APIs. This tag is a contract grouping, not a statement that the endpoint belongs to the `/ops` UI page.
  - name: org
    description: Organization, tenant, and workspace APIs.
paths:
  /healthz:
    get:
      tags: [public]
      summary: Liveness probe
      operationId: getHealthz
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /readyz:
    get:
      tags: [public]
      summary: Readiness probe
      operationId: getReadyz
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
  /metrics:
    get:
      tags: [public]
      summary: Prometheus metrics endpoint
      operationId: getMetrics
      responses:
        "200":
          description: Metrics text
          content:
            text/plain:
              schema:
                type: string
  /api/v1/webhooks/vmalert:
    post:
      tags: [public]
      summary: Ingest VMAlert webhook
      operationId: postVMAlertWebhook
      parameters:
        - name: X-Tars-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VMAlertWebhookRequest"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VMAlertWebhookResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/InvalidSignature"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
  /api/v1/channels/telegram/webhook:
    post:
      tags: [public]
      summary: Ingest Telegram webhook callback
      operationId: postTelegramWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramWebhookRequest"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramWebhookResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/InvalidSignature"
  /api/v1/platform/discovery:
    get:
      tags: [public]
      summary: Discover platform integration capabilities
      operationId: getPlatformDiscovery
      responses:
        "200":
          description: Platform discovery metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformDiscoveryResponse"
  /api/v1/auth/providers:
    get:
      tags: [public]
      summary: List available auth providers
      operationId: listAuthProviders
      responses:
        "200":
          description: Auth providers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProviderListResponse"
    post:
      tags: [ops]
      summary: Create auth provider
      operationId: createAuthProvider
      security:
        - OpsBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthProviderUpsertRequest"
      responses:
        "201":
          description: Auth provider created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProvider"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/providers/{provider_id}:
    get:
      tags: [ops]
      summary: Get auth provider
      operationId: getAuthProvider
      security:
        - OpsBearer: []
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Auth provider detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProvider"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [ops]
      summary: Update auth provider
      operationId: updateAuthProvider
      security:
        - OpsBearer: []
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthProviderUpsertRequest"
      responses:
        "200":
          description: Updated auth provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProvider"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/auth/providers/{provider_id}/enable:
    post:
      tags: [ops]
      summary: Enable auth provider
      operationId: enableAuthProvider
      security:
        - OpsBearer: []
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorReasonRequest"
      responses:
        "200":
          description: Enabled auth provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProvider"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/auth/providers/{provider_id}/disable:
    post:
      tags: [ops]
      summary: Disable auth provider
      operationId: disableAuthProvider
      security:
        - OpsBearer: []
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorReasonRequest"
      responses:
        "200":
          description: Disabled auth provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProvider"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/auth/login:
    post:
      tags: [public]
      summary: Login with local token, local password, or start OAuth login
      operationId: loginAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Auth login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/challenge:
    post:
      tags: [public]
      summary: Start or re-issue an auth challenge
      operationId: startAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthChallengeRequest"
      responses:
        "200":
          description: Challenge issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthChallengeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/verify:
    post:
      tags: [public]
      summary: Verify auth challenge code
      operationId: verifyAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyRequest"
      responses:
        "200":
          description: Challenge verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/mfa/verify:
    post:
      tags: [public]
      summary: Verify MFA code and issue session
      operationId: verifyAuthMFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthMFAVerifyRequest"
      responses:
        "200":
          description: MFA verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/logout:
    post:
      tags: [ops]
      summary: Logout current session
      operationId: logoutAuth
      security:
        - OpsBearer: []
      responses:
        "200":
          description: Logout accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/sessions:
    get:
      tags: [ops]
      summary: List visible auth sessions
      operationId: listAuthSessions
      security:
        - OpsBearer: []
      responses:
        "200":
          description: Visible auth sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInventoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/callback/{provider_id}:
    get:
      tags: [public]
      summary: Complete OAuth callback
      operationId: completeAuthCallback
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect with issued session token
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/me:
    get:
      tags: [ops]
      summary: Get current authenticated principal
      operationId: getMe
      security:
        - OpsBearer: []
      responses:
        "200":
          description: Current principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # -----------------------------------------------------------------------
  # Organization / Tenant / Workspace — single-tenant compat foundation v1
  # -----------------------------------------------------------------------
  /api/v1/org/context:
    get:
      tags: [org]
      summary: Get default org/tenant/workspace context
      operationId: getOrgContext
      description: |
        Returns the default Organization, Tenant, and Workspace for the current
        platform. In single-tenant mode these are always the seeded defaults.
      responses:
        "200":
          description: Current org context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgContextResponse"

  /api/v1/organizations:
    get:
      tags: [org]
      summary: List organizations
      operationId: listOrganizations
      responses:
        "200":
          description: Organization list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
    post:
      tags: [org]
      summary: Create organization
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Organization"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"

  /api/v1/organizations/{id}:
    get:
      tags: [org]
      summary: Get organization
      operationId: getOrganization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [org]
      summary: Update organization
      operationId: updateOrganization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Organization"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/tenants:
    get:
      tags: [org]
      summary: List tenants
      operationId: listTenants
      parameters:
        - name: org_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
    post:
      tags: [org]
      summary: Create tenant
      operationId: createTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Tenant"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"

  /api/v1/tenants/{id}:
    get:
      tags: [org]
      summary: Get tenant
      operationId: getTenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [org]
      summary: Update tenant
      operationId: updateTenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Tenant"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workspaces:
    get:
      tags: [org]
      summary: List workspaces
      operationId: listWorkspaces
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceListResponse"
    post:
      tags: [org]
      summary: Create workspace
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Workspace"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"

  /api/v1/workspaces/{id}:
    get:
      tags: [org]
      summary: Get workspace
      operationId: getWorkspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [org]
      summary: Update workspace
      operationId: updateWorkspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Workspace"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/users:
    get:
      tags: [ops]
      summary: List users
      operationId: listUsers
      security:
        - OpsBearer: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [ops]
      summary: Create user
      operationId: createUser
      security:
        - OpsBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpsertRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/users/{user_id}:
    get:
      tags: [ops]
      summary: Get user
      operationId: getUser
      security:
        - OpsBearer: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [ops]
      summary: Update user
      operationId: updateUser
      security:
        - OpsBearer: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpsertRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/users/{user_id}/enable:
    post:
      tags: [ops]
      summary: Enable user
      operationId: enableUser
      security:
        - OpsBearer: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorReasonRequest"
      responses:
        "200":
          description: Enabled user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/users/{user_id}/disable:
    post:
      tags: [ops]
      summary: Disable user
      operationId: disableUser
      security:
        - OpsBearer: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorReasonRequest"
      responses:
        "200":
          description: Disabled user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/groups:
    get:
      tags: [ops]
      summary: List groups
      operationId: listGroups
      security:
        - OpsBearer: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Group list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [ops]
      summary: Create group
      operationId: createGroup
      security:
        - OpsBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpsertRequest"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/groups/{group_id}:
    get:
      tags: [ops]
      summary: Get group
      operationId: getGroup
      security:
        - OpsBearer: []
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [ops]
      summary: Update group
      operationId: updateGroup
      security:
        - OpsBearer: []
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpsertRequest"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/groups/{group_id}/enable:
    post:
      tags: [ops]
      summary: Enable group
      operationId: enableGroup
      security:
        - OpsBearer: []
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorReasonRequest"
      responses:
        "200":
          description: Enabled group
          content:
            application/json:
              schema:
