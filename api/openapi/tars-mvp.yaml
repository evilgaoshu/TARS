components:
  securitySchemes:
    OpsBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque
  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Authenticated but not permitted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InvalidSignature:
      description: Invalid signature
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ValidationFailed:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    IdempotencyConflict:
      description: Idempotency conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    BlockedByFeatureFlag:
      description: Blocked by feature flag
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ProviderError:
      description: Upstream provider returned an error or was unreachable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    StateConflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    OpsAPIDisabled:
      description: Ops API disabled
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    AcceptedResponse:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: boolean
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          example: ready
        degraded:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    VMAlertWebhookRequest:
      type: object
      required: [status, alerts]
      properties:
        status:
          type: string
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/VMAlert"
    VMAlert:
      type: object
      required: [labels, annotations, startsAt]
      properties:
        labels:
          type: object
          additionalProperties:
            type: string
        annotations:
          type: object
          additionalProperties:
            type: string
        startsAt:
          type: string
          format: date-time
    VMAlertWebhookResponse:
      type: object
      required: [accepted, event_count, session_ids]
      properties:
        accepted:
          type: boolean
        duplicated:
          type: boolean
        event_count:
          type: integer
        session_ids:
          type: array
          items:
            type: string
    TelegramWebhookRequest:
      type: object
      description: Raw Telegram update payload
      additionalProperties: true
    TelegramWebhookResponse:
      type: object
      properties:
        accepted:
          type: boolean
    PlatformDiscoveryResponse:
