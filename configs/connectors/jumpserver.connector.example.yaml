api_version: tars.connector/v1alpha1
kind: connector
metadata:
  id: jumpserver-main
  name: jumpserver
  display_name: JumpServer Main
  vendor: jumpserver
  version: 1.0.0
  description: Managed execution provider using JumpServer
spec:
  type: execution
  protocol: jumpserver_api
  capabilities:
    - id: host.read
      action: query
      read_only: true
      scopes: ["asset.read"]
      description: Read host metadata and health
    - id: command.execute
      action: execute
      read_only: false
      scopes: ["execution.approved"]
      description: Execute approved commands through JumpServer
  connection_form:
    - key: base_url
      label: Base URL
      type: string
      required: true
      description: JumpServer API root
    - key: access_key
      label: Access Key
      type: secret
      required: true
      secret: true
    - key: secret_key
      label: Secret Key
      type: secret
      required: true
      secret: true
  import_export:
    exportable: true
    importable: true
    formats: ["yaml", "json", "tar.gz"]
config:
  values:
    base_url: https://jumpserver.example.com
    access_key: ""
    secret_key: ""
compatibility:
  tars_major_versions: ["1"]
  upstream_major_versions: ["3"]
  modes: ["managed", "imported"]
marketplace:
  category: execution
  tags: ["jumpserver", "approval", "execution"]
  source: official
