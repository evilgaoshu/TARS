providers:
  primary:
    provider_id: "lmstudio-local"
    model: "qwen/qwen3-4b-2507"

  assist:
    provider_id: "gemini-backup"
    model: "gemini-flash-lite-latest"

  entries:
    - id: "lmstudio-local"
      vendor: "lmstudio"
      protocol: "lmstudio"
      base_url: "http://192.168.1.132:1234"
      enabled: true

    - id: "gemini-backup"
      vendor: "gemini"
      protocol: "gemini"
      base_url: "https://generativelanguage.googleapis.com/v1beta"
      api_key_ref: "provider/gemini-backup/api_key"
      enabled: true

    - id: "dashscope-kimi"
      vendor: "dashscope"
      protocol: "openai_compatible"
      base_url: "https://coding.dashscope.aliyuncs.com/v1"
      api_key_ref: "provider/dashscope-kimi/api_key"
      enabled: true
